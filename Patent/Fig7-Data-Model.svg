<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 750" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="sh" x="-2%" y="-2%" width="104%" height="104%"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.08"/></filter>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#1a1a1a">Figure 7: Data Model — Storage Architecture</text>

  <!-- ON DEVICE boundary -->
  <rect x="15" y="50" width="570" height="530" rx="12" fill="#EBF5FB" stroke="#2980B9" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="30" y="72" font-size="13" font-weight="700" fill="#2980B9">ON DEVICE (Browser Storage)</text>
  <rect x="30" y="78" width="260" height="18" rx="4" fill="#C0392B"/>
  <text x="160" y="92" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">AUDIT DATA NEVER LEAVES THE DEVICE</text>

  <!-- IndexedDB Box -->
  <rect x="25" y="105" width="550" height="360" rx="10" fill="#fff" stroke="#2980B9" stroke-width="1.5" filter="url(#sh)"/>
  <text x="40" y="128" font-size="12" font-weight="700" fill="#2471A3">IndexedDB: SafetySignageAuditDB (v2)</text>

  <!-- AUDITS table -->
  <rect x="40" y="140" width="200" height="200" rx="8" fill="#F8F9FA" stroke="#2980B9" stroke-width="1"/>
  <rect x="40" y="140" width="200" height="28" rx="8" fill="#2980B9"/>
  <text x="140" y="159" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">AUDITS</text>

  <text x="50" y="185" font-size="9" fill="#333">id</text>
  <text x="180" y="185" font-size="8" fill="#999">PK</text>
  <text x="50" y="200" font-size="9" fill="#333">siteName</text>
  <text x="180" y="200" font-size="8" fill="#999">string</text>
  <text x="50" y="215" font-size="9" fill="#333">client</text>
  <text x="180" y="215" font-size="8" fill="#999">string</text>
  <text x="50" y="230" font-size="9" fill="#333">auditor</text>
  <text x="180" y="230" font-size="8" fill="#999">string</text>
  <text x="50" y="245" font-size="9" fill="#333">date</text>
  <text x="180" y="245" font-size="8" fill="#999">IX</text>
  <text x="50" y="260" font-size="9" fill="#333">notes</text>
  <text x="180" y="260" font-size="8" fill="#999">string</text>
  <text x="50" y="275" font-size="9" fill="#333">createdAt</text>
  <text x="180" y="275" font-size="8" fill="#999">ISO8601</text>

  <!-- 1:N relationship -->
  <line x1="240" y1="240" x2="300" y2="240" stroke="#333" stroke-width="2"/>
  <text x="255" y="233" font-size="9" font-weight="700" fill="#333">1</text>
  <text x="290" y="233" font-size="9" font-weight="700" fill="#333">N</text>
  <circle cx="297" cy="240" r="4" fill="#333"/>
  <circle cx="293" cy="236" r="2" fill="#333"/>
  <circle cx="293" cy="244" r="2" fill="#333"/>

  <!-- CAPTURES table -->
  <rect x="305" y="140" width="265" height="315" rx="8" fill="#F8F9FA" stroke="#2980B9" stroke-width="1"/>
  <rect x="305" y="140" width="265" height="28" rx="8" fill="#2980B9"/>
  <text x="437" y="159" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">CAPTURES</text>

  <text x="315" y="185" font-size="9" fill="#333">id</text>
  <text x="510" y="185" font-size="8" fill="#999">PK</text>
  <text x="315" y="200" font-size="9" fill="#333">auditId</text>
  <text x="510" y="200" font-size="8" fill="#999">FK, IX</text>
  <text x="315" y="215" font-size="9" fill="#333">photo</text>
  <text x="510" y="215" font-size="8" fill="#999">JPEG dataURL</text>
  <text x="315" y="230" font-size="9" fill="#333">contextPhoto</text>
  <text x="510" y="230" font-size="8" fill="#999">JPEG dataURL</text>
  <text x="315" y="245" font-size="9" fill="#333">lat, lng</text>
  <text x="510" y="245" font-size="8" fill="#999">GPS coords</text>
  <text x="315" y="260" font-size="9" fill="#333">locationDesc</text>
  <text x="510" y="260" font-size="8" fill="#999">4-level hierarchy</text>
  <text x="315" y="275" font-size="9" fill="#333">category</text>
  <text x="510" y="275" font-size="8" fill="#999">IX (7 types)</text>
  <text x="315" y="290" font-size="9" fill="#333">signNumber</text>
  <text x="510" y="290" font-size="8" fill="#999">Appendix B</text>
  <text x="315" y="305" font-size="9" fill="#333">signText</text>
  <text x="510" y="305" font-size="8" fill="#999">string</text>
  <text x="315" y="320" font-size="9" fill="#333">checks</text>
  <text x="510" y="320" font-size="8" fill="#999">object (20 bools)</text>
  <text x="315" y="335" font-size="9" fill="#333">overall</text>
  <text x="510" y="335" font-size="8" fill="#999">IX</text>
  <text x="315" y="350" font-size="9" fill="#333">notes</text>
  <text x="510" y="350" font-size="8" fill="#999">string</text>
  <text x="315" y="365" font-size="9" font-weight="600" fill="#8E44AD">detection</text>
  <text x="510" y="365" font-size="8" fill="#8E44AD">nested object</text>

  <!-- Detection subfields -->
  <rect x="320" y="372" width="230" height="75" rx="4" fill="#F5EEF8" stroke="#8E44AD" stroke-width="0.5"/>
  <text x="330" y="386" font-size="8" fill="#6C3483">├ confidence (0.0-1.0)</text>
  <text x="330" y="398" font-size="8" fill="#6C3483">├ colourConf, shapeConf, mlConf</text>
  <text x="330" y="410" font-size="8" fill="#6C3483">├ dominantColour, detectedShape</text>
  <text x="330" y="422" font-size="8" fill="#6C3483">├ auditorOverrides {cat, num, checks[]}</text>
  <text x="330" y="434" font-size="8" fill="#6C3483">├ reasoning, conditionNotes</text>
  <text x="330" y="446" font-size="8" fill="#6C3483">└ visionApiUsed, mlIsFineTuned</text>

  <!-- localStorage -->
  <rect x="25" y="475" width="550" height="95" rx="10" fill="#fff" stroke="#F39C12" stroke-width="1.5" filter="url(#sh)"/>
  <text x="40" y="498" font-size="12" font-weight="700" fill="#B7950B">localStorage</text>

  <text x="40" y="520" font-size="9" fill="#333">signageAudit_apiKey</text>
  <text x="250" y="520" font-size="8" fill="#999">User's Anthropic API key (BYOK)</text>

  <text x="40" y="536" font-size="9" fill="#333">signageAudit_modelPref</text>
  <text x="250" y="536" font-size="8" fill="#999">"fast" | "balanced" | "best"</text>

  <text x="40" y="552" font-size="9" fill="#333">license_cache</text>
  <text x="250" y="552" font-size="8" fill="#999">{ licensed: bool, until: timestamp } — 7-day TTL</text>

  <text x="40" y="568" font-size="9" fill="#333">eula-accepted</text>
  <text x="250" y="568" font-size="8" fill="#999">timestamp</text>

  <!-- CLOUD boundary -->
  <rect x="600" y="50" width="285" height="530" rx="12" fill="#E8F8F5" stroke="#1ABC9C" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="615" y="72" font-size="13" font-weight="700" fill="#148F77">CLOUD (Supabase)</text>
  <text x="615" y="90" font-size="9" fill="#1ABC9C">Auth + Licensing only</text>

  <!-- auth.users -->
  <rect x="615" y="110" width="255" height="150" rx="8" fill="#fff" stroke="#1ABC9C" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="615" y="110" width="255" height="28" rx="8" fill="#1ABC9C"/>
  <text x="742" y="129" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">auth.users (Supabase managed)</text>

  <text x="625" y="155" font-size="9" fill="#333">id</text>
  <text x="810" y="155" font-size="8" fill="#999">UUID, PK</text>
  <text x="625" y="172" font-size="9" fill="#333">email</text>
  <text x="810" y="172" font-size="8" fill="#999">string</text>
  <text x="625" y="189" font-size="9" fill="#333">encrypted_password</text>
  <text x="810" y="189" font-size="8" fill="#999">hash</text>
  <text x="625" y="206" font-size="9" fill="#333">confirmed_at</text>
  <text x="810" y="206" font-size="8" fill="#999">timestamp</text>
  <text x="625" y="223" font-size="9" fill="#333">created_at</text>
  <text x="810" y="223" font-size="8" fill="#999">timestamp</text>
  <text x="625" y="245" font-size="8" fill="#1ABC9C">Email/password auth via Resend SMTP</text>

  <!-- 1:1 relationship -->
  <line x1="742" y1="260" x2="742" y2="310" stroke="#333" stroke-width="2"/>
  <text x="750" y="278" font-size="9" font-weight="700" fill="#333">1</text>
  <text x="750" y="303" font-size="9" font-weight="700" fill="#333">1</text>

  <!-- licenses -->
  <rect x="615" y="310" width="255" height="200" rx="8" fill="#fff" stroke="#1ABC9C" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="615" y="310" width="255" height="28" rx="8" fill="#1ABC9C"/>
  <text x="742" y="329" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">LICENSES</text>

  <text x="625" y="355" font-size="9" fill="#333">id</text>
  <text x="800" y="355" font-size="8" fill="#999">UUID, PK</text>
  <text x="625" y="372" font-size="9" fill="#333">user_id</text>
  <text x="800" y="372" font-size="8" fill="#999">FK, UNIQUE</text>
  <text x="625" y="389" font-size="9" fill="#333">stripe_checkout_id</text>
  <text x="800" y="389" font-size="8" fill="#999">UNIQUE</text>
  <text x="625" y="406" font-size="9" fill="#333">stripe_customer_id</text>
  <text x="800" y="406" font-size="8" fill="#999">string</text>
  <text x="625" y="423" font-size="9" fill="#333">status</text>
  <text x="800" y="423" font-size="8" fill="#999">active | revoked</text>
  <text x="625" y="440" font-size="9" fill="#333">purchased_at</text>
  <text x="800" y="440" font-size="8" fill="#999">timestamp</text>
  <text x="625" y="457" font-size="9" fill="#333">amount_aud</text>
  <text x="800" y="457" font-size="8" fill="#999">14900</text>

  <text x="625" y="485" font-size="8" fill="#1ABC9C">RLS: users read own row only</text>
  <text x="625" y="498" font-size="8" fill="#1ABC9C">Writes via service_role (webhook only)</text>

  <!-- Stripe connection -->
  <rect x="615" y="530" width="255" height="40" rx="8" fill="#FEF9E7" stroke="#F39C12" stroke-width="1" filter="url(#sh)"/>
  <text x="742" y="548" text-anchor="middle" font-size="10" font-weight="600" fill="#B7950B">Stripe Webhook</text>
  <text x="742" y="562" text-anchor="middle" font-size="8" fill="#999">checkout.session.completed → insert licence</text>

  <!-- Arrow webhook to licenses -->
  <line x1="742" y1="530" x2="742" y2="510" stroke="#F39C12" stroke-width="1.5"/>
  <text x="750" y="523" font-size="8" fill="#B7950B">upsert</text>

  <!-- Privacy note -->
  <rect x="15" y="600" width="870" height="65" rx="8" fill="#FADBD8" stroke="#C0392B" stroke-width="1"/>
  <text x="450" y="622" text-anchor="middle" font-size="11" font-weight="700" fill="#C0392B">PRIVACY BY DESIGN</text>
  <text x="450" y="640" text-anchor="middle" font-size="10" fill="#555">Audit data (photos, GPS, compliance records) is stored exclusively on the user's device.</text>
  <text x="450" y="657" text-anchor="middle" font-size="10" fill="#555">Cloud storage is limited to authentication credentials and licence status. No audit data is transmitted.</text>

  <!-- Legend -->
  <text x="40" y="690" font-size="9" font-weight="600" fill="#333">Legend:</text>
  <text x="100" y="690" font-size="8" fill="#999">PK = Primary Key  |  FK = Foreign Key  |  IX = Index  |  UNIQUE = Unique constraint  |  RLS = Row-Level Security</text>

  <text x="450" y="740" text-anchor="middle" font-size="9" fill="#aaa">SymbioTeK Pty Ltd (ACN 694 230 334) — Confidential</text>
</svg>