<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 1080" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#333"/></marker>
    <marker id="aR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#C0392B"/></marker>
    <marker id="aG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#27AE60"/></marker>
    <filter id="s" x="-2%" y="-2%" width="104%" height="104%"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.08"/></filter>
  </defs>

  <text x="390" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#1a1a1a">Figure 3: Three-Tier Detection Pipeline</text>

  <!-- Input -->
  <rect x="250" y="48" width="280" height="38" rx="19" fill="#004B87" filter="url(#s)"/>
  <text x="390" y="72" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Sign Photo Captured (JPEG)</text>

  <line x1="390" y1="86" x2="390" y2="110" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Decision: Online + credits? -->
  <polygon points="390,110 510,148 390,186 270,148" fill="#FEF9E7" stroke="#F39C12" stroke-width="1.5"/>
  <text x="390" y="145" text-anchor="middle" font-size="10" font-weight="600" fill="#B7950B">Online +</text>
  <text x="390" y="159" text-anchor="middle" font-size="10" font-weight="600" fill="#B7950B">credits available?</text>

  <!-- Yes branch -->
  <text x="295" y="185" font-size="9" font-weight="600" fill="#27AE60">Yes</text>
  <line x1="390" y1="186" x2="390" y2="216" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- No branch -->
  <text x="518" y="145" font-size="9" font-weight="600" fill="#E74C3C">No</text>
  <line x1="510" y1="148" x2="650" y2="148" stroke="#E74C3C" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="650" y1="148" x2="650" y2="505" stroke="#E74C3C" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- User notification box for offline/no credits -->
  <rect x="560" y="178" width="190" height="50" rx="6" fill="#FADBD8" stroke="#E74C3C" stroke-width="1"/>
  <text x="655" y="198" text-anchor="middle" font-size="8" font-weight="600" fill="#C0392B">User is notified:</text>
  <text x="655" y="212" text-anchor="middle" font-size="8" fill="#C0392B">"Using local analysis</text>
  <text x="655" y="224" text-anchor="middle" font-size="8" fill="#C0392B">(lower accuracy, offline)"</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- TIER 1: Vision API (Sonnet / Opus) -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="150" y="216" width="470" height="165" rx="10" fill="#F5EEF8" stroke="#8E44AD" stroke-width="2" filter="url(#s)"/>
  <rect x="160" y="221" width="200" height="22" rx="4" fill="#8E44AD"/>
  <text x="260" y="237" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">TIER 1: Vision API (Cloud AI)</text>
  <text x="375" y="237" font-size="10" font-weight="600" fill="#6C3483">Highest accuracy</text>

  <text x="170" y="260" font-size="9" fill="#555">Image sent to server-side proxy → Anthropic Claude API</text>
  <text x="170" y="276" font-size="9" fill="#555">User selects model when purchasing credits:</text>

  <!-- Sonnet box -->
  <rect x="170" y="286" width="200" height="40" rx="6" fill="#EBF5FB" stroke="#2980B9" stroke-width="1"/>
  <text x="270" y="304" text-anchor="middle" font-size="9" font-weight="700" fill="#2471A3">Sonnet (Claude Sonnet 4.6)</text>
  <text x="270" y="318" text-anchor="middle" font-size="8" fill="#2471A3">Well-maintained sites, clear signs</text>

  <!-- Opus box -->
  <rect x="390" y="286" width="215" height="40" rx="6" fill="#FEF9E7" stroke="#F39C12" stroke-width="1"/>
  <text x="497" y="304" text-anchor="middle" font-size="9" font-weight="700" fill="#B7950B">Opus (Claude Opus 4.6)</text>
  <text x="497" y="318" text-anchor="middle" font-size="8" fill="#B7950B">Faded, damaged, worn signs</text>

  <text x="170" y="346" font-size="9" fill="#555">Returns: category, sign number, 20 compliance checks,</text>
  <text x="170" y="360" font-size="9" fill="#555">confidence score (calibrated), reasoning, condition notes</text>

  <rect x="440" y="340" width="165" height="35" rx="6" fill="#fff" stroke="#8E44AD" stroke-width="1"/>
  <text x="522" y="355" text-anchor="middle" font-size="9" font-weight="600" fill="#6C3483">Timeout: 15 seconds</text>
  <text x="522" y="368" text-anchor="middle" font-size="8" fill="#999">Credit deducted on success</text>

  <!-- Success from Tier 1: route left around Tier 2 and Tier 3 boxes -->
  <text x="140" y="396" font-size="9" font-weight="600" fill="#27AE60">Success</text>
  <path d="M150,381 L150,395 L80,395 L80,855 L190,855" stroke="#27AE60" stroke-width="1.5" fill="none" marker-end="url(#aG)"/>
  <text x="65" y="620" font-size="8" fill="#27AE60" transform="rotate(-90,65,620)">Tier 1 result (highest accuracy)</text>

  <text x="460" y="396" font-size="9" font-weight="600" fill="#E74C3C">Fail / Timeout</text>
  <line x1="490" y1="381" x2="490" y2="418" stroke="#E74C3C" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#aR)"/>

  <!-- User notification for fallback -->
  <rect x="380" y="396" width="230" height="22" rx="4" fill="#FADBD8" stroke="#E74C3C" stroke-width="0.5"/>
  <text x="495" y="412" text-anchor="middle" font-size="8" fill="#C0392B">User notified: "AI unavailable — running local analysis"</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- TIER 2: ML Model (staggered right) -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="200" y="425" width="460" height="120" rx="10" fill="#FEF5E7" stroke="#E67E22" stroke-width="2" filter="url(#s)"/>
  <rect x="210" y="430" width="280" height="22" rx="4" fill="#E67E22"/>
  <text x="350" y="446" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">TIER 2: ML Model (In-Browser, Offline Fallback)</text>

  <text x="220" y="470" font-size="9" fill="#555">Fine-tuned MobileNet v3 Small via TensorFlow.js</text>
  <text x="220" y="486" font-size="9" fill="#555">Trained on 94K safety sign images (ORP-SIG-2024)</text>
  <text x="220" y="502" font-size="9" fill="#555">Output: category classification only (no sign number, no checks)</text>
  <text x="220" y="518" font-size="9" fill="#555">~500ms inference, works fully offline, no credits required</text>

  <rect x="490" y="465" width="155" height="45" rx="6" fill="#fff" stroke="#E67E22" stroke-width="1"/>
  <text x="567" y="482" text-anchor="middle" font-size="9" font-weight="600" fill="#A04000">Lower accuracy</text>
  <text x="567" y="496" text-anchor="middle" font-size="8" fill="#999">Category only — auditor</text>
  <text x="567" y="508" text-anchor="middle" font-size="8" fill="#999">completes remaining fields</text>

  <!-- Fail from Tier 2 -->
  <text x="510" y="560" font-size="9" font-weight="600" fill="#E74C3C">Not loaded</text>
  <line x1="540" y1="545" x2="540" y2="580" stroke="#E74C3C" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#aR)"/>

  <!-- Success from Tier 2: route left around Tier 3 box -->
  <text x="178" y="560" font-size="9" font-weight="600" fill="#27AE60">Loaded</text>
  <path d="M200,545 L200,565 L120,565 L120,855 L190,855" stroke="#27AE60" stroke-width="1.5" fill="none" marker-end="url(#aG)"/>
  <text x="105" y="720" font-size="8" fill="#27AE60" transform="rotate(-90,105,720)">Tier 2 result (moderate)</text>

  <!-- No branch joins to Tier 3 -->
  <line x1="680" y1="505" x2="680" y2="600" stroke="#E74C3C" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="680" y1="600" x2="660" y2="600" stroke="#E74C3C" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#aR)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- TIER 3: CV Pipeline (staggered further right) -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="250" y="580" width="410" height="220" rx="10" fill="#EAFAF1" stroke="#27AE60" stroke-width="2" filter="url(#s)"/>
  <rect x="260" y="585" width="310" height="22" rx="4" fill="#27AE60"/>
  <text x="415" y="601" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">TIER 3: Computer Vision (Pure JS, Offline Fallback)</text>

  <text x="270" y="625" font-size="9" fill="#555">1. Preprocess (resize to 640px)</text>
  <text x="270" y="640" font-size="9" fill="#555">2. White-balance correction</text>
  <text x="270" y="655" font-size="9" fill="#555">3. Histogram equalisation (V-channel)</text>
  <text x="270" y="670" font-size="9" fill="#555">4. Colour analysis (K-means + grid hybrid)</text>
  <text x="270" y="685" font-size="9" fill="#555">5. Shape detection (3-method ensemble)</text>
  <text x="270" y="700" font-size="9" fill="#555">6. Sign classification (adaptive scoring)</text>
  <text x="270" y="715" font-size="9" fill="#555">7. Compliance auto-assessment (7 of 20 checks*)</text>

  <text x="295" y="732" font-size="7" fill="#999">*13 checks require physical inspection (height, size, illumination) — not assessable from image</text>

  <rect x="490" y="620" width="155" height="60" rx="6" fill="#fff" stroke="#27AE60" stroke-width="1"/>
  <text x="567" y="637" text-anchor="middle" font-size="9" font-weight="600" fill="#1E8449">Timeout: 5 seconds</text>
  <text x="567" y="652" text-anchor="middle" font-size="8" fill="#999">Lowest accuracy</text>
  <text x="567" y="665" text-anchor="middle" font-size="8" fill="#999">No external dependencies</text>
  <text x="567" y="678" text-anchor="middle" font-size="8" fill="#999">No credits required</text>

  <!-- User notification for Tier 3 -->
  <rect x="270" y="740" width="370" height="22" rx="4" fill="#D5F5E3" stroke="#27AE60" stroke-width="0.5"/>
  <text x="455" y="755" text-anchor="middle" font-size="8" fill="#1E8449">User sees: "Local CV" badge with lower confidence — auditor reviews all fields</text>

  <!-- Success from Tier 3 -->
  <line x1="480" y1="800" x2="480" y2="850" stroke="#27AE60" stroke-width="1.5" marker-end="url(#aG)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- Standardised Output -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="190" y="850" width="400" height="65" rx="10" fill="#004B87" filter="url(#s)"/>
  <text x="390" y="872" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Standardised Detection Result</text>
  <text x="390" y="890" text-anchor="middle" font-size="9" fill="#D6EAF8">All 3 tiers produce identical output format</text>
  <text x="390" y="904" text-anchor="middle" font-size="9" fill="#D6EAF8">category, signNumber, checks, confidence, reasoning</text>

  <!-- Arrow to form -->
  <line x1="390" y1="915" x2="390" y2="940" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Form population -->
  <rect x="190" y="940" width="400" height="60" rx="8" fill="#D5F5E3" stroke="#27AE60" stroke-width="1.5" filter="url(#s)"/>
  <text x="390" y="962" text-anchor="middle" font-size="11" font-weight="600" fill="#1E8449">Auto-Populate Capture Form</text>
  <text x="390" y="978" text-anchor="middle" font-size="9" fill="#27AE60">High (≥0.7): auto-fill   Medium (0.4-0.69): verify   Low (&lt;0.4): manual</text>
  <text x="390" y="992" text-anchor="middle" font-size="8" fill="#999">Source badge: "Vision AI (Sonnet)" | "Vision AI (Opus)" | "Local CV" | "Local ML"</text>

  <!-- Accuracy comparison -->
  <rect x="150" y="1010" width="470" height="28" rx="6" fill="#F2F3F4" stroke="#95A5A6" stroke-width="0.5"/>
  <text x="390" y="1028" text-anchor="middle" font-size="9" fill="#717D7E">Accuracy: Opus (highest) > Sonnet (high) > ML Model (moderate) > CV Pipeline (baseline)</text>

  <!-- Copyright -->
  <text x="390" y="1062" text-anchor="middle" font-size="9" fill="#aaa">SymbioTeK Pty Ltd (ACN 694 230 334) — Confidential</text>
</svg>